<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
</body>
<script>
    //1st target is to select parent element and find out
    //what are the other elements in that parent element.
    const parent = document.querySelector('.parent')
    console.log(parent);
    console.log(parent.children); // It returns HTML collection
    //console.log(parent.children[0].innerHTML); // HTML Collection
    //is somewhat simiar to array we can use indexing but not loops.
    // now we want to use loop 
    // for (let i = 0; i < parent.children.length; i++) {
    //     console.log(parent.children[i].innerHTML);
    // }
    // we can also use styling 
    parent.children[0].style.color = 'orange';
    //some interesting properties
    // console.log(parent.firstElementChild);
    // console.log(parent.lastElementChild);

    const dayOne = document.querySelector('.day')
    console.log(dayOne);
    // how to move back to parent without using query selector
    //b/c query selector uses travesing of tree.(to optimize basically)
    // console.log(dayOne.parentElement);
    // console.log(dayOne.nextElementSibling);
    console.log("NODES: ", parent.childNodes);
    
</script>
</html>
