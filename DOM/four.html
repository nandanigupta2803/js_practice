<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLanguage(languageName){
        const li = document.createElement('li')
        li.innerHTML = `${languageName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("Python")
    addLanguage("React")
    //This method has a problem every time we have to add a language in 
    //the end we have to traverse the whole tree, not good for large scale projects
    //Second method using DSA
    function addOptiLanguage(languageName){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(languageName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("HTML")

    //Edit
    const secondLang = document.querySelector("li:nth-child(2)")
    //secondLang.innerHTML = "Py" // Again not optimized approach
    //Alternative method by creating a new element and then replacing it
    const newLi = document.createElement('li')
    newLi.textContent = "Java"
    secondLang.replaceWith(newLi)
    //Another method 
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML= '<li>TypeScript</li>'

    //Remove
    const lastLang = document.querySelector("li:last-child")
    lastLang.remove()
</script>
</html>
