//task - when we click on the pictures they remove from screen
// we can select individual picture and then add event to all of them but it is not a good approach
//b/c if the would be 100- 200 photos then it will a problem
// so we target the "ul" so that all of the picturs can be operated.
document.querySelector('#images').addEventListener('click', function(e){
    // console.log(e.target.parentNode);
    // let removeIt = e.target.parentNode
    // removeIt.remove()
//now there a problem if I click anywhere on the screen except pictures the whole thing removes, so we use strict checks in the function
    console.log(e.target.tagName);
    if (e.target.tagName === 'IMG') {
        console.log(e.target.id);
        let removeIt = e.target.parentNode
        removeIt.remove()
    }

}, false)
